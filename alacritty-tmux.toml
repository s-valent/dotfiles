# style = "SemiBold Italic"

[font]
size = 12.4

[font.normal]
family = "JB Nerd"
style = "Regular"

[font.bold]
style = "Bold"

[font.italic]
style = "Regular Italic"

[font.bold_italic]
style = "Bold Italic"

[colors]
transparent_background_colors = true
draw_bold_text_with_bright_colors = false

[colors.bright]
black = "0x7f7f7f"
blue = "0x6699cc"
cyan = "0x5fb3b3"
green = "0x99c794"
magenta = "0xc594c5"
red = "0xe15a60"
white = "0xd4d4d4"
yellow = "0xfac863"

[colors.cursor]
cursor = "0xcccccc"
text = "0x2d2d2d"

[colors.normal]
black = "0x3f3f3f"
blue = "0x6699cc"
cyan = "0x5fb3b3"
green = "0x99c794"
magenta = "0xc594c5"
red = "0xe15a60"
white = "0xd4d4d4"
yellow = "0xfac863"

[colors.primary]
background = "0x2d2d2d"
foreground = "0xcccccc"

[cursor]
thickness = 0.3

[cursor.style]
shape = "Block"
blinking = "Never"

# [terminal]
# osc52 = "CopyPaste"

[[keyboard.bindings]]
key = "Left"
mods = "Alt"
chars = "\u001Bb"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
chars = "\u001Bf"

[[keyboard.bindings]]
key = "Left"
mods = "Command"
chars = "\u001BOH"

[[keyboard.bindings]]
key = "Right"
mods = "Command"
chars = "\u001BOF"

[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\u0015"

[[keyboard.bindings]]
key = "Back"
mods = "Alt"
chars = "\u001B\u007F"

[[keyboard.bindings]]
key = "Z"
mods = "Command"
chars = "\u0018\u0015"

# [[keyboard.bindings]]
# key = "Tab"
# mods = "Control"
# action = "SelectNextTab"

# [[keyboard.bindings]]
# key = "Tab"
# mods = "Control | Shift"
# action = "SelectPreviousTab"

[[keyboard.bindings]]
key = "Space"
mods = "Control"
chars = "\u0000"

# tmux
[[keyboard.bindings]]
key = "`"
mods = "Control"
chars = "\u001B[24;5~"

[[keyboard.bindings]]
key = "Tab"
mods = "Control"
chars = "\u001B[24;5~n"

[[keyboard.bindings]]
key = "Tab"
mods = "Control | Shift"
chars = "\u001B[24;5~p"

[[keyboard.bindings]]
key = "Tab"
mods = "Alt"
chars = "\u001B[24;5~n"

[[keyboard.bindings]]
key = "Tab"
mods = "Alt | Shift"
chars = "\u001B[24;5~p"

[[keyboard.bindings]]
key = "T"
mods = "Command"
chars = "\u001B[24;5~c"

[[keyboard.bindings]]
key = "-"
mods = "Command"
chars = "\u001B[24;5~\""

[[keyboard.bindings]]
