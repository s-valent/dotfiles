chars = "\u001B[24;5~4"

[[keyboard.bindings]]
key = "5"
mods = "Command"
chars = "\u001B[24;5~5"

[[keyboard.bindings]]
key = "6"
mods = "Command"
chars = "\u001B[24;5~6"

[[keyboard.bindings]]
key = "7"
mods = "Command"
chars = "\u001B[24;5~7"

[[keyboard.bindings]]
key = "8"
mods = "Command"
chars = "\u001B[24;5~8"

[[keyboard.bindings]]
key = "9"
mods = "Command"
chars = "\u001B[24;5~9"
