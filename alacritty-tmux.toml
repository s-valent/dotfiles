[shell]
program = "/bin/sh"
args = ["-c", "(tmux ls | grep -v '(attached)$' && exec /opt/homebrew/bin/tmux attach) || exec /opt/homebrew/bin/tmux new"]

[env]
TERM = "xterm-256color"

[window]
title = "Terminal"
decorations = "None"
startup_mode = "Maximized"
decorations_theme_variant = "Dark"
blur = true
opacity = 0.90
dynamic_padding = true

[window.padding]
x = 2
y = 2

[scrolling]
history = 100000

